<script type="text/babel">
    const { useState } = React;

    const OPENAI_API_KEY = 'sk-proj-your-key-here';

    function CommunityCare() {

        const [view, setView] = useState('login');
        const [username, setUsername] = useState('');
        const [profile, setProfile] = useState(null);
        const [messages, setMessages] = useState([]);
        const [input, setInput] = useState('');
        const [loading, setLoading] = useState(false);

        // ✅ FIX: moved here (top-level hook)
        const [form, setForm] = useState({ name: '', age: '', sex: '' });

        const resources = [
            {
                id: '1',
                name: 'North Side Food Bank',
                category: 'food',
                description: 'Free groceries and hot meals for families in need',
                phone: '(817) 555-0100',
                hours: 'Mon-Fri 9AM-5PM'
            },
            {
                id: '2',
                name: 'Safe Haven Housing',
                category: 'housing',
                description: 'Emergency shelter and transitional housing assistance',
                phone: '(817) 555-0200',
                hours: '24/7 Hotline'
            },
            {
                id: '3',
                name: 'Community Health Clinic',
                category: 'healthcare',
                description: 'Free medical care, dental services, and mental health support',
                phone: '(817) 555-0300',
                hours: 'Tue-Sat 8AM-6PM'
            },
            {
                id: '6',
                name: 'Crisis Hotline 24/7',
                category: 'crisis',
                description: 'Immediate support for mental health emergencies',
                phone: '988',
                hours: '24/7'
            }
        ];

        const handleSend = async () => {
            if (!input.trim()) return;

            const userMsg = { role: 'user', content: input };
            setMessages(prev => [...prev, userMsg]);

            const currentInput = input;
            setInput('');
            setLoading(true);

            const crisisWords = ['suicide', 'kill myself', 'hurt myself', 'end my life'];

            if (crisisWords.some(word =>
                currentInput.toLowerCase().includes(word))) {

                setMessages(prev => [...prev, {
                    role: 'assistant',
                    content: '🚨 Please contact the Crisis Hotline immediately at 988 (24/7). Your safety is the top priority.',
                    resources: [resources.find(r => r.id === '6')]
                }]);

                setLoading(false);
                return;
            }

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${OPENAI_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-3.5-turbo',
                        messages: [{
                            role: 'system',
                            content: `You are a helpful assistant for CommunityCare Network.
Respond in JSON:
{"message": "response", "recommendedResourceIds": ["1"]}`
                        }, {
                            role: 'user',
                            content: currentInput
                        }]
                    })
                });

                const data = await response.json();
                let parsed;

                try {
                    parsed = JSON.parse(data.choices[0].message.content);
                } catch {
                    parsed = {
                        message: data.choices[0].message.content,
                        recommendedResourceIds: []
                    };
                }

                const recommended = resources.filter(r =>
                    parsed.recommendedResourceIds?.includes(r.id)
                );

                setMessages(prev => [...prev, {
                    role: 'assistant',
                    content: parsed.message,
                    resources: recommended
                }]);

            } catch (error) {
                setMessages(prev => [...prev, {
                    role: 'assistant',
                    content: `Error: ${error.message}`
                }]);
            }

            setLoading(false);
        };

        if (view === 'login') {
            return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: '#f9fafb' }}>
                    <div style={{ background: 'white', padding: '2rem', borderRadius: '12px', width: '90%', maxWidth: '400px' }}>
                        <h2>🏥 CommunityCare</h2>
                        <input
                            value={username}
                            onChange={e => setUsername(e.target.value)}
                            placeholder="Enter username"
                            style={{ width: '100%', padding: '0.75rem', marginBottom: '1rem' }}
                        />
                        <button
                            onClick={() => username.trim() && setView('profile')}
                            style={{ width: '100%', padding: '0.75rem' }}
                        >
                            Continue
                        </button>
                    </div>
                </div>
            );
        }

        if (view === 'profile') {
            return (
                <div style={{ padding: '2rem' }}>
                    <h2>Tell Us About Yourself</h2>

                    <input
                        placeholder="Full Name"
                        value={form.name}
                        onChange={e => setForm({ ...form, name: e.target.value })}
                    /><br /><br />

                    <input
                        type="number"
                        placeholder="Age"
                        value={form.age}
                        onChange={e => setForm({ ...form, age: e.target.value })}
                    /><br /><br />

                    <select
                        value={form.sex}
                        onChange={e => setForm({ ...form, sex: e.target.value })}
                    >
                        <option value="">Select...</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Non-binary</option>
                    </select>

                    <br /><br />

                    <button onClick={() => setView('login')}>Cancel</button>
                    <button
                        disabled={!form.name || !form.age || !form.sex}
                        onClick={() => {
                            setProfile(form);
                            setView('chat');
                        }}
                    >
                        Start Chatting
                    </button>
                </div>
            );
        }

        return (
            <div style={{ padding: '2rem' }}>
                <h1>Welcome {profile?.name}</h1>

                {messages.map((m, i) => (
                    <div key={i}>
                        <strong>{m.role}:</strong> {m.content}
                    </div>
                ))}

                <input
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyPress={e => e.key === 'Enter' && handleSend()}
                />
                <button onClick={handleSend}>Send</button>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CommunityCare />);
</script>
